# This file generates the GitHub Actions matrix
# For simple board + shield combinations, add them
# to the top level board and shield arrays, for more
# control, add individual board + shield combinations to
# the `include` property, e.g:
#
# board: [ "nice_nano//zmk" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano//zmk
#     shield: reviung41
#
---
include:
  - board: nice_nano//zmk
    shield: wk_kinesis_left
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_STUDIO_LOCKING=n
    artifact-name: wk_kinesis_left_studio
  - board: nice_nano//zmk
    shield: wk_kinesis_left
    artifact-name: wk_kinesis_left
  - board: nice_nano//zmk
    shield: wk_kinesis_right
    artifact-name: wk_kinesis_right
  - board: nice_nano//zmk
    shield: settings_reset
    # === 有线分体排障变体（只刷左半测试）===
  - board: nice_nano//zmk
    shield: wk_kinesis_left
    cmake-args: -DCONFIG_ZMK_SPLIT_WIRED=y -DCONFIG_ZMK_SPLIT_WIRED_UART_MODE_POLLING=y -DCONFIG_ZMK_SPLIT_BLE=n
    artifact-name: test_left_wired_polling
  - board: nice_nano//zmk
    shield: wk_kinesis_left
    cmake-args: -DCONFIG_ZMK_SPLIT_WIRED=y -DCONFIG_ZMK_SPLIT_WIRED_UART_MODE_ASYNC=y -DCONFIG_ZMK_SPLIT_BLE=n
    artifact-name: test_left_wired_async
  - board: nice_nano//zmk
    shield: wk_kinesis_left
    cmake-args: -DCONFIG_ZMK_SPLIT_WIRED=y -DCONFIG_ZMK_SPLIT_WIRED_UART_MODE_INTERRUPT=y -DCONFIG_ZMK_SPLIT_BLE=n -DCONFIG_ZMK_USB_LOGGING=y
    artifact-name: test_left_wired_interrupt_log
  - board: nice_nano//zmk
    shield: wk_kinesis_left
    cmake-args: -DCONFIG_ZMK_SPLIT_WIRED=n
    artifact-name: test_left_node_disabled
